name: Daily Auto Commit

on:
  schedule:
    - cron: "0 9 * * *"
  workflow_dispatch:

jobs:
  auto-commit:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Update timestamp file
        run: |
          mkdir -p .github/auto-commit
          echo "Last updated: $(date -u '+%Y-%m-%d %H:%M:%S UTC')" > .github/auto-commit/last-update.md

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .github/auto-commit/last-update.md
          git diff --staged --quiet || git commit -m "chore: daily auto-update"
          git push
